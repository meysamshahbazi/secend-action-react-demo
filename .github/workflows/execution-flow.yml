name: Website Deployment
on:
  workflow_dispatch:
    
  # push:
  #   branches:
  #     - master
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: build client
        run: mkdir -p build
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ./build/
          key: b-files-${{ hashFiles('./server.c')}}
      - name: dummy install deps
        if: steps.cache.outputs.cashe-hit != 'true'
        run: echo "dummy install deps"
        

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v5
        with:
          path: ./build/
          key: b-files-${{ hashFiles('./server.c')}}
      - name: Install dependencies
        run: echo "act as install deps"
      - name: Test code
        id: run-tests
        run: mkdir -p build # act as an error
      - name: Upload test report 
        if: failure() && steps.run-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: server.c # act as a fake report!
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Build website
        id: build-website
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist-files
      - name: Output contents
        run: ls
      - name: Deploy
        run: echo "Deploying..."
  report:
    needs: [lint, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: output info
        run: |
          echo "somthing went worng"
          echo "${{toJson(github)}}"
